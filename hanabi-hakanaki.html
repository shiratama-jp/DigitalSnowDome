<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Snow Domes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>流・星・夢</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: #0a1628;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }

    h1 {
      font-size: clamp(16px, 4.5vw, 20px);
      font-weight: 900;
      color: rgba(200, 220, 255, 0.7);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    #dome-wrap {
      position: relative;
      width: min(90vw, 380px);
      height: min(90vw, 380px);
    }

    #dome-canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(100, 150, 255, 0.15), 0 0 80px rgba(100, 150, 255, 0.08), inset 0 0 30px rgba(200, 220, 255, 0.05);
    }

    #base {
      width: min(78vw, 340px);
      background: linear-gradient(180deg, #8a6a40, #6a4a28, #5a3a18);
      border-radius: 0 0 20px 20px;
      margin: -6px auto 0;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
      position: relative;
      padding: 10px 14px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #clock {
      margin-right: auto;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: clamp(16px, 4.5vw, 22px);
      font-weight: 900;
      color: rgba(255, 230, 180, 0.85);
      letter-spacing: 2px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
    }

    #base::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255, 220, 150, 0.3), transparent);
      border-radius: 2px;
    }

    .base-btn {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid rgba(255, 220, 150, 0.3);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 230, 180, 0.7);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .base-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .base-btn.active {
      background: rgba(100, 180, 255, 0.2);
      border-color: rgba(100, 180, 255, 0.5);
      color: rgba(180, 220, 255, 0.9);
    }

    .base-btn.star-active {
      background: rgba(255, 220, 100, 0.2);
      border-color: rgba(255, 220, 100, 0.55);
      color: rgba(255, 240, 190, 0.95);
    }

    #permission-btn {
      display: none;
      margin-top: 16px;
      padding: 12px 28px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 14px;
      font-weight: 900;
      border: 2px solid rgba(200, 220, 255, 0.3);
      border-radius: 60px;
      background: rgba(100, 150, 255, 0.15);
      color: rgba(200, 220, 255, 0.8);
      cursor: pointer;
    }

    #controls {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      justify-content: center;
      flex-wrap: wrap;
      max-width: min(88vw, 360px);
    }

    .ctl-btn {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: clamp(11px, 3vw, 13px);
      font-weight: 700;
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(200, 220, 255, 0.22);
      background: rgba(20, 30, 60, 0.5);
      color: rgba(200, 220, 255, 0.75);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .ctl-btn:hover {
      background: rgba(30, 50, 90, 0.7);
      color: rgba(220, 235, 255, 0.95);
    }

    .ctl-btn.active {
      background: rgba(100, 180, 255, 0.22);
      border-color: rgba(100, 180, 255, 0.55);
      color: rgba(190, 225, 255, 0.98);
    }

    #toast {
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 22px;
      background: rgba(20, 30, 60, 0.88);
      color: rgba(220, 235, 255, 0.95);
      border: 1px solid rgba(180, 210, 255, 0.3);
      border-radius: 24px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: 0 6px 24px rgba(40, 80, 160, 0.4);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
    }

    /* 戻るボタン */
    .back-btn {
      position: fixed;
      bottom: 10px;
      left: 10px;
      padding: 6px 14px;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      border: 1px solid rgba(200, 220, 255, 0.22);
      border-radius: 60px;
      background: rgba(20, 30, 60, 0.55);
      color: rgba(200, 220, 255, 0.75);
      text-decoration: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      transition: background 0.15s, color 0.15s;
    }

    .back-btn:hover {
      background: rgba(30, 50, 90, 0.7);
      color: rgba(220, 235, 255, 0.95);
    }
  </style>
</head>

<body>
  <h1>🌠 流・星・夢 🌠</h1>
  <div id="dome-wrap"><canvas id="dome-canvas"></canvas></div>
  <div id="base">
    <div id="clock">00:00</div>
    <button class="base-btn" id="auto-btn">🌠 じどう</button>
  </div>

  <div id="controls">
    <button class="ctl-btn" id="bgm-btn">🎵 おふ</button>
    <button class="ctl-btn" id="awake-btn">🔆 しばらく見る</button>
  </div>

  <button id="permission-btn">❄️ センサーをつかう</button>
  <div id="toast"></div>

  <a class="back-btn" href="./index.html">← もどる</a>

  <script>
    const canvas = document.getElementById('dome-canvas');
    const ctx = canvas.getContext('2d');
    const SIZE = 400;
    canvas.width = SIZE; canvas.height = SIZE;
    const CX = SIZE / 2, CY = SIZE / 2, RADIUS = SIZE / 2 - 4;

    // 月（外周円弧に沿って ゆっくり 行ったり来たり）
    const MOON_X_INIT = 300, MOON_Y_INIT = 70;
    const MOON_ORBIT_R = 174; // 外周にめり込まないように少し下げる
    const MOON_BASE_THETA = -Math.PI / 2; // 真上を基準
    const MOON_AMP = Math.PI * 0.46;      // ドームのほぼ真横まで到達する超広角
    const MOON_PERIOD_MS = 60000;        // 60秒で1往復（ゆったりめに調整）
    let MOON_X = MOON_X_INIT, MOON_Y = MOON_Y_INIT;

    function updateMoonOrbit() {
      const t = Date.now() / MOON_PERIOD_MS * Math.PI * 2;
      const theta = MOON_BASE_THETA + Math.sin(t) * MOON_AMP;
      MOON_X = CX + Math.cos(theta) * MOON_ORBIT_R;
      MOON_Y = CY + Math.sin(theta) * MOON_ORBIT_R;
    }

    // 地面のY座標
    const GROUND_Y = CY + RADIUS * 0.48;

    // 夜空に星が留まる範囲（上端は月の下限あたり、下端はドーム中央のやや上）
    const SKY_TOP = 92;
    const SKY_BOTTOM = 175;
    const FIX_PROB = 0.028;  // 夜空内で停止する1フレームあたり確率

    // 雪パーティクル
    const SNOW_COUNT = 200;
    const snowflakes = [];

    // 花
    const flowers = [];

    // 傾き・シェイク
    let tiltX = 0, tiltY = 0;
    let shakeForce = 0;
    let lastAccel = { x: 0, y: 0, z: 0 };
    let motionBaseline = 0;
    let sensorReady = false;

    // 花火とターゲット
    const targetEmojis = [
      { emoji: '💎', color: '#88eeff', style: 'sparkle' },
      { emoji: '❤️', color: '#ff6688', style: 'heart' },
      { emoji: '🎵', color: '#88ff66', style: 'bounce' },
      { emoji: '🔔', color: '#ffdd44', style: 'ring' }
    ];
    let targets = [];
    let fireworks = [];
    let autoHanabi = false;
    let gameTimer = null;

    // ペットたち
    const pets = [
      { emoji: '🐕', x: CX - 60, y: GROUND_Y + 45, baseY: GROUND_Y + 45, jumpY: 0, vx: 0.5, vy: 0, faceRight: true, jump: false },
      { emoji: '🐈', x: CX + 60, y: GROUND_Y + 45, baseY: GROUND_Y + 45, jumpY: 0, vx: -0.6, vy: 0, faceRight: false, jump: false }
    ];

    function spawnTarget(x, y) {
      const type = targetEmojis[Math.floor(Math.random() * targetEmojis.length)];
      targets.push({
        x: x !== undefined ? x : 40 + Math.random() * (SIZE - 80),
        y: y !== undefined ? y : SKY_BOTTOM + 20 + Math.random() * 40,
        vy: -0.9 - Math.random() * 0.6, // 天井を突き抜けない程度に調整
        vx: (Math.random() - 0.5) * 0.4,
        type: type,
        life: 1,
        age: 0,
        burstY: SKY_TOP + Math.random() * (SKY_BOTTOM - SKY_TOP)
      });
    }

    function burstTarget(t) {
      t.life = 0;
      const count = 35 + Math.floor(Math.random() * 20);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 1.5 + Math.random() * 3.5;
        fireworks.push({
          x: t.x, y: t.y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          color: t.type.color,
          style: t.type.style,
          life: 1.2,
          decay: 0.015 + Math.random() * 0.02
        });
      }
      if (t.type.style === 'ring') {
        for (let i = 0; i < 24; i++) {
          const a = (Math.PI * 2 / 24) * i;
          fireworks.push({
            x: t.x, y: t.y, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3,
            color: t.type.color, style: 'ring', life: 1.2, decay: 0.025
          });
        }
      }
      if (navigator.vibrate) { try { navigator.vibrate(30); } catch (e) { } }

      // 花火の音に驚いてペットが跳ねる
      for (const p of pets) {
        if (Math.random() < 0.6 && p.vy === 0) p.jump = true;
      }
    }

    function startGameSpawn() {
      if (gameTimer) return;
      function tick() {
        if (targets.length < 6) {
          spawnTarget();
        }
        gameTimer = setTimeout(tick, 1000 + Math.random() * 1500);
      }
      tick();
    }

    // ===== 花 =====
    const FLOWER_COLORS = ['#ff6b9d', '#ff9f43', '#ffcc44', '#88eeff', '#cc88ff', '#ff88aa', '#66ddaa'];

    function spawnFlower(x, y) {
      flowers.push({
        x, y,
        size: 0, maxSize: 6 + Math.random() * 6,
        phase: 0,
        bloomTime: 0, bloomDuration: 3000 + Math.random() * 3000,
        color: FLOWER_COLORS[Math.floor(Math.random() * FLOWER_COLORS.length)],
        petals: 5 + Math.floor(Math.random() * 3),
        life: 1
      });
    }

    // ===== センサー =====
    async function requestSensor() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try { const p = await DeviceOrientationEvent.requestPermission(); if (p === 'granted') enableOrientation(); } catch (e) { }
        try { const p = await DeviceMotionEvent.requestPermission(); if (p === 'granted') enableMotion(); } catch (e) { }
        document.getElementById('permission-btn').style.display = 'none';
      }
    }
    function enableOrientation() {
      sensorReady = true;
      window.addEventListener('deviceorientation', (e) => {
        tiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 60));
        tiltY = Math.max(-1, Math.min(1, ((e.beta || 90) - 90) / 60));
      });
    }
    let lastShakeSpawn = 0;
    let lastSwipeSpawn = 0;

    function enableMotion() {
      window.addEventListener('devicemotion', (e) => {
        const a = e.accelerationIncludingGravity; if (!a) return;
        const dx = a.x - lastAccel.x, dy = a.y - lastAccel.y, dz = a.z - lastAccel.z;
        const force = Math.sqrt(dx * dx + dy * dy + dz * dz);
        motionBaseline = motionBaseline * 0.98 + force * 0.02;
        const net = force - motionBaseline;
        if (net > 2) shakeForce = Math.min(shakeForce + net * 0.6, 22);
        if (net > 5) {
          const now = Date.now();
          if (now - lastShakeSpawn > 100) {
            const num = 2 + Math.floor(Math.random() * 3); // 2〜4個
            for (let i = 0; i < num; i++) spawnTarget();
            lastShakeSpawn = now;
          }
        }
        lastAccel = { x: a.x || 0, y: a.y || 0, z: a.z || 0 };
      });
    }
    function enableTouchFallback() {
      let touching = false;
      function maybeHitOrSpawnAt(clientX, clientY, rect) {
        const now = Date.now();
        if (now - lastSwipeSpawn < 80) return;
        const x = (clientX - rect.left) / rect.width * SIZE;
        const y = (clientY - rect.top) / rect.height * SIZE;
        
        let hit = false;
        for (let i = targets.length - 1; i >= 0; i--) {
          const t = targets[i];
          const dx = t.x - x, dy = t.y - y;
          if (dx*dx + dy*dy < 1200) { // 半径約34px以内
            burstTarget(t);
            hit = true;
          }
        }
        if (!hit && !autoHanabi) {
          spawnTarget(x, SIZE); // 下から打ち上げ
        }
        lastSwipeSpawn = now;
      }
      canvas.addEventListener('mousedown', (e) => {
        touching = true;
        maybeHitOrSpawnAt(e.clientX, e.clientY, canvas.getBoundingClientRect());
      });
      canvas.addEventListener('mouseup', () => { touching = false; tiltX = 0; tiltY = 0; });
      canvas.addEventListener('mousemove', (e) => {
        if (!touching) return;
        const r = canvas.getBoundingClientRect();
        tiltX = ((e.clientX - r.left) / r.width * 2 - 1) * 0.8;
        tiltY = ((e.clientY - r.top) / r.height * 2 - 1) * 0.8;
      });
      let lastTap = 0;
      canvas.addEventListener('click', () => { const n = Date.now(); if (n - lastTap < 400) shakeForce = 20; lastTap = n; });
      canvas.addEventListener('touchstart', (e) => { e.preventDefault(); touching = true; ut(e); }, { passive: false });
      canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (touching) ut(e); }, { passive: false });
      canvas.addEventListener('touchend', () => { touching = false; tiltX = 0; tiltY = 0; });
      function ut(e) {
        const t = e.touches[0], r = canvas.getBoundingClientRect();
        tiltX = ((t.clientX - r.left) / r.width * 2 - 1) * 0.8;
        tiltY = ((t.clientY - r.top) / r.height * 2 - 1) * 0.8;
        maybeHitOrSpawnAt(t.clientX, t.clientY, r);
      }
    }
    function initSensor() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.getElementById('permission-btn').style.display = 'block';
        document.getElementById('permission-btn').addEventListener('click', requestSensor);
      } else if ('DeviceOrientationEvent' in window) {
        enableOrientation(); if ('DeviceMotionEvent' in window) enableMotion();
        setTimeout(() => { if (!sensorReady) enableTouchFallback(); }, 1500);
      }
      enableTouchFallback();
    }

    // ===== 描画 =====
    function drawBackground() {
      ctx.save();
      ctx.beginPath(); ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2); ctx.clip();

      // 夜空
      const ng = ctx.createRadialGradient(CX, CY - 30, 20, CX, CY, RADIUS);
      ng.addColorStop(0, '#1a2a50'); ng.addColorStop(0.5, '#0f1a38'); ng.addColorStop(1, '#080e20');
      ctx.fillStyle = ng;
      ctx.fillRect(0, 0, SIZE, SIZE);

      // 背景の星
      ctx.fillStyle = 'rgba(255,255,200,0.6)';
      const bgStars = [[80, 60], [140, 40], [280, 55], [100, 100], [250, 80], [180, 30], [60, 120], [320, 130]];
      for (const [sx, sy] of bgStars) {
        ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.003 + sx) * 0.3;
        ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;

      // 月
      ctx.fillStyle = '#ffe8aa';
      ctx.beginPath(); ctx.arc(MOON_X, MOON_Y, 20, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#0f1a38';
      ctx.beginPath(); ctx.arc(MOON_X + 10, MOON_Y - 5, 18, 0, Math.PI * 2); ctx.fill();

      // 地面
      const grassGrad = ctx.createLinearGradient(0, GROUND_Y - 10, 0, CY + RADIUS);
      grassGrad.addColorStop(0, '#3a6a30');
      grassGrad.addColorStop(0.5, '#2a5a22');
      grassGrad.addColorStop(1, '#1a4a18');
      ctx.fillStyle = grassGrad;
      ctx.beginPath();
      ctx.moveTo(CX - RADIUS, GROUND_Y);
      ctx.quadraticCurveTo(CX - RADIUS * 0.5, GROUND_Y - 8, CX, GROUND_Y - 3);
      ctx.quadraticCurveTo(CX + RADIUS * 0.5, GROUND_Y + 5, CX + RADIUS, GROUND_Y);
      ctx.lineTo(CX + RADIUS, CY + RADIUS);
      ctx.arc(CX, CY, RADIUS, 0, Math.PI, false);
      ctx.closePath();
      ctx.fill();

      // 草のディテール
      ctx.strokeStyle = 'rgba(80,140,60,0.3)';
      ctx.lineWidth = 1.2;
      for (let i = 0; i < 15; i++) {
        const gx = CX - RADIUS * 0.7 + (RADIUS * 1.4 / 15) * i + Math.sin(i * 5) * 5;
        const gy = GROUND_Y + 2 + Math.sin(gx * 0.03) * 3;
        const sw = Math.sin(Date.now() * 0.002 + i) * 2;
        ctx.beginPath(); ctx.moveTo(gx, gy);
        ctx.quadraticCurveTo(gx + sw, gy - 6, gx + sw * 1.2, gy - 10);
        ctx.stroke();
      }

      // ツリー
      drawTree(CX, CY + RADIUS * 0.35);
      // ひまわり
      drawSunflower(CX + 70, CY + RADIUS * 0.45);
      // 家
      drawHouse(CX - 80, CY + RADIUS * 0.48);

      ctx.restore(); // クリップ解除
    }

    function drawTree(x, y) {
      ctx.fillStyle = '#5a3a1a'; ctx.fillRect(x - 5, y, 10, 20);
      ctx.fillStyle = '#1a6a30';
      ctx.beginPath(); ctx.moveTo(x, y - 55); ctx.lineTo(x - 22, y - 15); ctx.lineTo(x + 22, y - 15); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#1a7a38';
      ctx.beginPath(); ctx.moveTo(x, y - 42); ctx.lineTo(x - 28, y - 2); ctx.lineTo(x + 28, y - 2); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#1a8a40';
      ctx.beginPath(); ctx.moveTo(x, y - 28); ctx.lineTo(x - 34, y + 8); ctx.lineTo(x + 34, y + 8); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffe040'; ctx.font = '14px serif'; ctx.textAlign = 'center';
      ctx.fillText('⭐', x, y - 54);
      const orn = [{ x: x - 12, y: y - 8, c: '#ff4444' }, { x: x + 14, y: y - 12, c: '#4488ff' }, { x: x - 8, y: y - 25, c: '#ffaa00' }, { x: x + 10, y: y - 30, c: '#ff44aa' }, { x: x - 16, y: y + 2, c: '#44ddff' }, { x: x + 6, y: y - 2, c: '#ff6644' }];
      for (const o of orn) {
        ctx.fillStyle = o.c; ctx.beginPath(); ctx.arc(o.x, o.y, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(o.x - 1, o.y - 1, 1.5, 0, Math.PI * 2); ctx.fill();
      }
    }

    function drawSunflower(x, y) {
      // 茎
      ctx.strokeStyle = '#2d8a2d'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x, y + 20); ctx.lineTo(x, y - 5); ctx.stroke();
      // 葉っぱ
      ctx.fillStyle = '#3a9a30';
      ctx.beginPath(); ctx.ellipse(x - 8, y + 10, 8, 4, 0.3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(x + 8, y + 5, 8, 4, -0.3, 0, Math.PI*2); ctx.fill();
      // 花びら
      ctx.save(); ctx.translate(x, y - 5);
      ctx.fillStyle = '#ffcc00';
      for (let i = 0; i < 12; i++) {
        ctx.rotate(Math.PI * 2 / 12);
        ctx.beginPath(); ctx.ellipse(0, -9, 3, 9, 0, 0, Math.PI*2); ctx.fill();
      }
      // 真ん中
      ctx.fillStyle = '#6a4515';
      ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
      // 種の模様
      ctx.fillStyle = '#503010';
      for (let i = 0; i < 6; i++) {
        ctx.beginPath(); ctx.arc(Math.cos(i) * 3, Math.sin(i) * 3, 1, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }

    function drawHouse(x, y) {
      ctx.fillStyle = '#c8a070'; ctx.fillRect(x - 20, y - 10, 40, 30);
      ctx.fillStyle = '#884030';
      ctx.beginPath(); ctx.moveTo(x - 26, y - 10); ctx.lineTo(x, y - 32); ctx.lineTo(x + 26, y - 10); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffdd66'; ctx.fillRect(x - 12, y - 4, 10, 8); ctx.fillRect(x + 2, y - 4, 10, 8);
      ctx.strokeRect(x - 12, y - 4, 10, 8); ctx.strokeRect(x + 2, y - 4, 10, 8);
      ctx.fillStyle = '#8a6040'; ctx.fillRect(x - 5, y + 6, 10, 14);
    }

    function drawStarParticle(s) {
      const twinkle = 0.5 + Math.sin(s.shimmer * 2) * 0.5;
      const alpha = (s.opacity * 0.65 + twinkle * 0.35) * s.depth;
      const sz = Math.max(s.size * s.depth * 1.25, 1);
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.shimmer * 0.25);
      ctx.globalAlpha = alpha * 0.45;
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 2.8);
      g.addColorStop(0, 'rgba(255,255,230,1)'); g.addColorStop(0.35, 'rgba(255,240,180,0.55)'); g.addColorStop(1, 'rgba(255,240,180,0)');
      ctx.fillStyle = g; ctx.fillRect(-sz * 2.8, -sz * 2.8, sz * 5.6, sz * 5.6);
      ctx.globalAlpha = alpha; ctx.fillStyle = '#fffde8';
      const rl = sz * 2.0, rt = Math.max(sz * 0.15, 0.5);
      ctx.fillRect(-rt, -rl, rt * 2, rl * 2); ctx.fillRect(-rl, -rt, rl * 2, rt * 2);
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, sz * 0.45, 0, Math.PI * 2); ctx.fill();
      ctx.restore(); ctx.globalAlpha = 1;
    }


    function drawFlowers() {
      const now = Date.now();
      for (const f of flowers) {
        if (f.life <= 0) continue;
        if (f.phase === 0) {
          f.size += (f.maxSize - f.size) * 0.08;
          if (f.size > f.maxSize * 0.95) { f.phase = 1; f.bloomTime = now; }
        } else if (f.phase === 1) {
          if (now - f.bloomTime > f.bloomDuration) f.phase = 2;
        } else {
          f.life -= 0.015;
        }
        ctx.save(); ctx.translate(f.x, f.y); ctx.globalAlpha = f.life;
        for (let i = 0; i < f.petals; i++) {
          ctx.save(); ctx.rotate((Math.PI * 2 / f.petals) * i);
          ctx.fillStyle = f.color;
          ctx.beginPath(); ctx.ellipse(0, -f.size * 0.5, f.size * 0.3, f.size * 0.5, 0, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }
        ctx.fillStyle = '#ffee88'; ctx.beginPath(); ctx.arc(0, 0, f.size * 0.25, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      for (let i = flowers.length - 1; i >= 0; i--) { if (flowers[i].life <= 0) flowers.splice(i, 1); }
    }

    function drawDomeGlass() {
      ctx.save(); ctx.beginPath(); ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2); ctx.clip();
      const hl = ctx.createRadialGradient(CX - 40, CY - 60, 10, CX - 40, CY - 60, 120);
      hl.addColorStop(0, 'rgba(255,255,255,0.12)'); hl.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hl; ctx.fillRect(0, 0, SIZE, SIZE);
      ctx.strokeStyle = 'rgba(200,220,255,0.15)'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(CX, CY, RADIUS - 2, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }

    // ===== 物理 =====
    function update() {
      shakeForce *= 0.97; if (shakeForce < 0.05) shakeForce = 0;

      // ターゲット（絵文字）の更新
      for (const t of targets) {
        t.age++;
        t.x += t.vx; t.y += t.vy;
        t.vy += 0.008; // わずかな重力減速
        t.vx += tiltX * 0.05;
        
        if (autoHanabi && t.vy > 0 && t.life > 0) { // 最高点（ピーク）に達した瞬間に弾ける
          burstTarget(t);
        } else if (t.y < 35 && t.life > 0) { // ドームの枠外に出そうになったら強制的に弾ける
          burstTarget(t);
        }
        if (t.y > SIZE + 20 || t.age > 800) t.life = 0;
      }
      targets = targets.filter(t => t.life > 0);

      // ペットの更新（歩きながら跳ねる）
      for (const p of pets) {
        // 左右の移動
        p.x += p.vx;
        if (p.x < CX - RADIUS + 40 || p.x > CX + RADIUS - 40) {
          p.vx *= -1;
          p.faceRight = p.vx > 0;
        } else if (Math.random() < 0.005) {
          p.vx *= -1;
          p.faceRight = p.vx > 0;
        }

        // ジャンプの物理
        if (p.jump) {
          p.vy = -3 - Math.random() * 2;
          p.jump = false;
        }
        if (p.vy !== 0 || p.jumpY < 0) {
          p.jumpY += p.vy;
          p.vy += 0.4; // 重力
          if (p.jumpY > 0) {
            p.jumpY = 0;
            p.vy = 0;
          }
        }
      }

      // 花火パーティクルの更新
      for (const f of fireworks) {
        f.x += f.vx; f.y += f.vy;
        f.vy += 0.05; // 重力
        f.vx *= 0.96; f.vy *= 0.96; // 空気抵抗
        f.life -= f.decay;
        f.vx += tiltX * 0.1; f.vy += tiltY * 0.1; // 傾きの影響
        
        if (f.style === 'bounce' && Math.random() < 0.05) {
          f.vx += (Math.random() - 0.5) * 3;
          f.vy -= Math.random() * 2;
        }
      }
      fireworks = fireworks.filter(f => f.life > 0);
    }

    // 流れ星
    let shootingStars = [];
    let lastShootingStar = 0;
    function maybeSpawnShootingStar() {
      const now = Date.now();
      // 出現頻度を大幅にアップ（流星群！）
      if (now - lastShootingStar > 500 + Math.random() * 2000) {
        lastShootingStar = now;
        if (Math.random() < 0.7) {
          shootingStars.push({
            x: 40 + Math.random() * SIZE * 0.4, y: 20 + Math.random() * 50,
            vx: 3.5 + Math.random() * 3.5, vy: 1 + Math.random() * 1.5, life: 1, trail: []
          });
        }
      }
    }
    function updateShootingStars() {
      for (const ss of shootingStars) {
        ss.trail.unshift({ x: ss.x, y: ss.y, alpha: ss.life }); if (ss.trail.length > 12) ss.trail.pop();
        ss.x += ss.vx; ss.y += ss.vy; ss.life -= 0.025;

        // 絵文字ターゲットとの当たり判定（流れ星が絵文字に当たったらドーン！）
        for (let i = targets.length - 1; i >= 0; i--) {
          const t = targets[i];
          const dx = t.x - ss.x, dy = t.y - ss.y;
          const distSq = dx * dx + dy * dy;
          if (distSq < 900) { // 半径30px以内くらい
            burstTarget(t);
            ss.life = 0; // 当たった流れ星も消える
            break;
          }
        }
      }
      shootingStars = shootingStars.filter(ss => ss.life > 0);
    }
    function drawShootingStars() {
      ctx.save();
      for (const ss of shootingStars) {
        for (let i = 0; i < ss.trail.length; i++) {
          const t = ss.trail[i], a = t.alpha * (1 - i / ss.trail.length) * 0.6, w = (1 - i / ss.trail.length) * 2.5;
          ctx.strokeStyle = `rgba(255,255,220,${a})`; ctx.lineWidth = w; ctx.lineCap = 'round';
          if (i < ss.trail.length - 1) {
            ctx.beginPath(); ctx.moveTo(ss.trail[i].x, ss.trail[i].y);
            ctx.lineTo(ss.trail[i + 1].x, ss.trail[i + 1].y); ctx.stroke();
          }
        }
        ctx.globalAlpha = ss.life;
        ctx.fillStyle = '#fffde0'; ctx.beginPath(); ctx.arc(ss.x, ss.y, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,200,0.4)'; ctx.beginPath(); ctx.arc(ss.x, ss.y, 4, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    function drawTargets() {
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '28px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
      for (const t of targets) {
        ctx.fillText(t.type.emoji, t.x, t.y);
      }
      ctx.restore();
    }

    function drawFireworks() {
      ctx.save();
      for (const f of fireworks) {
        ctx.globalAlpha = Math.max(0, f.life);
        ctx.fillStyle = f.color;
        
        if (f.style === 'sparkle') {
          ctx.beginPath();
          ctx.ellipse(f.x, f.y, 1.5, 5, Math.atan2(f.vy, f.vx), 0, Math.PI*2);
          ctx.fill();
        } else if (f.style === 'heart') {
          ctx.beginPath(); ctx.arc(f.x, f.y, 2.5, 0, Math.PI*2); ctx.fill();
        } else {
          ctx.beginPath(); ctx.arc(f.x, f.y, 1.5 + f.life, 0, Math.PI*2); ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawPets() {
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.font = '22px "Segoe UI Emoji", "Apple Color Emoji", sans-serif';
      for (const p of pets) {
        ctx.save();
        ctx.translate(p.x, p.y + p.jumpY);
        if (p.faceRight) {
          ctx.scale(-1, 1);
        }
        ctx.fillText(p.emoji, 0, 0);
        ctx.restore();
      }
      ctx.restore();
    }

    function render() {
      updateMoonOrbit();
      update();
      maybeSpawnShootingStar();
      updateShootingStars();
      ctx.clearRect(0, 0, SIZE, SIZE);
      drawBackground();

      // 花とペット（地面の上に描画、ドームでクリップ）
      ctx.save(); ctx.beginPath(); ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2); ctx.clip();
      drawFlowers();
      drawPets();
      ctx.restore();

      // 花火とターゲット
      drawTargets();
      drawFireworks();

      drawShootingStars();

      drawDomeGlass();
      requestAnimationFrame(render);
    }

    // ===== 開始 =====
    initSensor();
    render();

    startGameSpawn();

    // 時計
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }
    updateClock(); setInterval(updateClock, 1000);

    // オートモード切替
    const autoBtn = document.getElementById('auto-btn');
    autoBtn.addEventListener('click', () => {
      autoHanabi = !autoHanabi;
      autoBtn.classList.toggle('active', autoHanabi);
    });

    // ===== トースト =====
    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ===== BGM =====
    const BGM_TRACKS = [
      null,
      { name: '宇宙', src: './seishishitauchu.mp3' },
      { name: '夢', src: './tenshinoyume.mp3' },
      { name: '星', src: './yuubenohoshi.mp3' }
    ];
    let bgmIndex = 0;
    let bgmAudio = null;
    const bgmBtn = document.getElementById('bgm-btn');
    bgmBtn.addEventListener('click', () => {
      bgmIndex = (bgmIndex + 1) % BGM_TRACKS.length;
      if (bgmAudio) { bgmAudio.pause(); bgmAudio.src = ''; bgmAudio = null; }
      const track = BGM_TRACKS[bgmIndex];
      if (track) {
        bgmAudio = new Audio(track.src);
        bgmAudio.loop = true;
        bgmAudio.volume = 0.4;
        bgmAudio.play().catch(() => showToast('再生できなかった'));
        bgmBtn.textContent = `🎵 ${track.name}`;
        bgmBtn.classList.add('active');
      } else {
        bgmBtn.textContent = '🎵 おふ';
        bgmBtn.classList.remove('active');
      }
    });

    // ===== スリープ回避（Screen Wake Lock） =====
    const AWAKE_MS = 15 * 60 * 1000;
    let wakeLock = null;
    let awakeUntil = 0;
    let awakeTicker = null;
    let lastDisplayedMin = -1;
    const awakeBtn = document.getElementById('awake-btn');

    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) return false;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
        return true;
      } catch (e) { return false; }
    }

    function releaseWakeLock() {
      if (wakeLock) { wakeLock.release().catch(() => { }); wakeLock = null; }
    }

    function renderAwakeBtn() {
      if (awakeUntil) {
        const remMin = Math.max(0, Math.ceil((awakeUntil - Date.now()) / 60000));
        if (remMin !== lastDisplayedMin) {
          awakeBtn.textContent = `🔆 あと${remMin}分`;
          lastDisplayedMin = remMin;
        }
      } else {
        awakeBtn.textContent = '🔆 しばらく見る';
        lastDisplayedMin = -1;
      }
    }

    async function startAwake() {
      if (!('wakeLock' in navigator)) { showToast('この端末では非対応だよ'); return; }
      const ok = await acquireWakeLock();
      if (!ok) { showToast('スリープ回避できなかった'); return; }
      awakeUntil = Date.now() + AWAKE_MS;
      awakeBtn.classList.add('active');
      renderAwakeBtn();
      showToast('15分 表示しつづけます');
      if (awakeTicker) clearInterval(awakeTicker);
      awakeTicker = setInterval(() => {
        if (Date.now() >= awakeUntil) { stopAwake('15分経過したよ'); return; }
        renderAwakeBtn();
      }, 1000);
    }

    function stopAwake(reason) {
      releaseWakeLock();
      awakeUntil = 0;
      if (awakeTicker) { clearInterval(awakeTicker); awakeTicker = null; }
      awakeBtn.classList.remove('active');
      renderAwakeBtn();
      if (reason) showToast(reason);
    }

    awakeBtn.addEventListener('click', () => {
      if (awakeUntil) stopAwake('スリープ回避を解除');
      else startAwake();
    });

    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible' && awakeUntil) {
        if (Date.now() >= awakeUntil) stopAwake();
        else if (!wakeLock) await acquireWakeLock();
      }
    });

    // 戻るボタン：履歴に index.html を積まず history.back() で戻る
    // （メニューに居るときに Android ◀ を押すと PWA が終了するように）
    document.querySelector('.back-btn').addEventListener('click', (e) => {
      if (history.length > 1) {
        e.preventDefault();
        history.back();
      }
    });

    // ===== Service Worker 登録（PWA） =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch((err) => {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>
</body>

</html>
