<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Snow Domes">
<meta name="mobile-web-app-capable" content="yes">
<title>ほしふらせ</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #0a1628;
  min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden; touch-action: none; user-select: none;
}
h1 { font-size: clamp(16px, 4.5vw, 20px); font-weight: 900; color: rgba(200,220,255,0.7); letter-spacing: 2px; margin-bottom: 8px; }
#dome-wrap { position: relative; width: min(90vw, 380px); height: min(90vw, 380px); }
#dome-canvas { width: 100%; height: 100%; border-radius: 50%;
  box-shadow: 0 0 40px rgba(100,150,255,0.15), 0 0 80px rgba(100,150,255,0.08), inset 0 0 30px rgba(200,220,255,0.05);
}
#base {
  width: min(78vw, 340px);
  background: linear-gradient(180deg, #8a6a40, #6a4a28, #5a3a18);
  border-radius: 0 0 20px 20px; margin: -6px auto 0;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4); position: relative;
  padding: 10px 14px 12px; display: flex; align-items: center; gap: 6px;
}
#clock { margin-right: auto; font-family: 'Zen Maru Gothic', sans-serif;
  font-size: clamp(16px, 4.5vw, 22px); font-weight: 900;
  color: rgba(255,230,180,0.85); letter-spacing: 2px; text-shadow: 0 1px 4px rgba(0,0,0,0.4);
}
#base::before { content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 3px;
  background: linear-gradient(90deg, transparent, rgba(255,220,150,0.3), transparent); border-radius: 2px;
}
.base-btn {
  font-family: 'Zen Maru Gothic', sans-serif; font-size: clamp(11px, 3vw, 13px); font-weight: 700;
  padding: 6px 12px; border-radius: 20px; border: 1.5px solid rgba(255,220,150,0.3);
  background: rgba(255,255,255,0.08); color: rgba(255,230,180,0.7); cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.5px; white-space: nowrap;
}
.base-btn:hover { background: rgba(255,255,255,0.15); }
.base-btn.active { background: rgba(100,180,255,0.2); border-color: rgba(100,180,255,0.5); color: rgba(180,220,255,0.9); }
.base-btn.star-active { background: rgba(255,220,100,0.2); border-color: rgba(255,220,100,0.55); color: rgba(255,240,190,0.95); }
#permission-btn { display: none; margin-top: 16px; padding: 12px 28px;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px; font-weight: 900;
  border: 2px solid rgba(200,220,255,0.3); border-radius: 60px;
  background: rgba(100,150,255,0.15); color: rgba(200,220,255,0.8); cursor: pointer;
}
#controls {
  display: flex; gap: 8px; margin-top: 14px; justify-content: center;
  flex-wrap: wrap; max-width: min(88vw, 360px);
}
.ctl-btn {
  font-family: 'Zen Maru Gothic', sans-serif; font-size: clamp(11px, 3vw, 13px); font-weight: 700;
  padding: 7px 14px; border-radius: 20px; border: 1.5px solid rgba(200,220,255,0.22);
  background: rgba(20,30,60,0.5); color: rgba(200,220,255,0.75); cursor: pointer;
  transition: all 0.2s; letter-spacing: 0.5px; white-space: nowrap;
}
.ctl-btn:hover { background: rgba(30,50,90,0.7); color: rgba(220,235,255,0.95); }
.ctl-btn.active { background: rgba(100,180,255,0.22); border-color: rgba(100,180,255,0.55); color: rgba(190,225,255,0.98); }
#toast {
  position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
  padding: 10px 22px; background: rgba(20,30,60,0.88); color: rgba(220,235,255,0.95);
  border: 1px solid rgba(180,210,255,0.3); border-radius: 24px;
  font-family: 'Zen Maru Gothic', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 1px; box-shadow: 0 6px 24px rgba(40,80,160,0.4);
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; white-space: nowrap;
}
#toast.show { opacity: 1; }
/* 戻るボタン */
.back-btn {
  position: fixed; bottom: 10px; left: 10px;
  padding: 6px 14px; font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
  border: 1px solid rgba(200,220,255,0.22); border-radius: 60px;
  background: rgba(20,30,60,0.55); color: rgba(200,220,255,0.75);
  text-decoration: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 100; transition: background 0.15s, color 0.15s;
}
.back-btn:hover { background: rgba(30,50,90,0.7); color: rgba(220,235,255,0.95); }
</style>
</head>
<body>
<h1>🌟 ほしふらせ 🌟</h1>
<div id="dome-wrap"><canvas id="dome-canvas"></canvas></div>
<div id="base">
  <div id="clock">00:00</div>
  <button class="base-btn" id="snow-toggle-btn">❄️ ゆき</button>
  <button class="base-btn" id="auto-btn">❄️ ふきあげ</button>
  <button class="base-btn" id="star-btn">⭐ ほし</button>
</div>

<div id="controls">
  <button class="ctl-btn" id="bgm-btn">🎵 おふ</button>
  <button class="ctl-btn" id="awake-btn">🔆 しばらく見る</button>
</div>

<button id="permission-btn">❄️ センサーをつかう</button>
<div id="toast"></div>

<a class="back-btn" href="./index.html">← もどる</a>

<script>
const canvas = document.getElementById('dome-canvas');
const ctx = canvas.getContext('2d');
const SIZE = 400;
canvas.width = SIZE; canvas.height = SIZE;
const CX = SIZE / 2, CY = SIZE / 2, RADIUS = SIZE / 2 - 4;

// 月（外周円弧に沿って ゆっくり 行ったり来たり）
const MOON_X_INIT = 300, MOON_Y_INIT = 70;
const MOON_ORBIT_R = Math.sqrt((MOON_X_INIT - CX) * (MOON_X_INIT - CX) + (MOON_Y_INIT - CY) * (MOON_Y_INIT - CY));
const MOON_BASE_THETA = Math.atan2(MOON_Y_INIT - CY, MOON_X_INIT - CX);
const MOON_AMP = Math.PI / 18;      // ±10° の振幅
const MOON_PERIOD_MS = 26000;        // 26秒で1往復
let MOON_X = MOON_X_INIT, MOON_Y = MOON_Y_INIT;

function updateMoonOrbit() {
  const t = Date.now() / MOON_PERIOD_MS * Math.PI * 2;
  const theta = MOON_BASE_THETA + Math.sin(t) * MOON_AMP;
  MOON_X = CX + Math.cos(theta) * MOON_ORBIT_R;
  MOON_Y = CY + Math.sin(theta) * MOON_ORBIT_R;
}

// 地面のY座標
const GROUND_Y = CY + RADIUS * 0.48;

// 夜空に星が留まる範囲（上端は月の下限あたり、下端はドーム中央のやや上）
const SKY_TOP = 92;
const SKY_BOTTOM = 175;
const FIX_PROB = 0.028;  // 夜空内で停止する1フレームあたり確率

// 雪パーティクル
const SNOW_COUNT = 200;
const snowflakes = [];

// 星パーティクル（別配列）
const stars = [];
const MAX_FIXED_STARS = 15; // この数まで空に留まる
let fixedStarCount = 0;
let starSpawnTimer = null;
let starMode = false;

// 花
const flowers = [];

// 傾き・シェイク
let tiltX = 0, tiltY = 0;
let shakeForce = 0;
let lastAccel = { x: 0, y: 0, z: 0 };
let motionBaseline = 0;
let sensorReady = false;
let autoSnow = false;
let autoTimer = null;
let snowVisible = true;

// ===== 雪 =====
function initSnow() {
  snowflakes.length = 0;
  for (let i = 0; i < SNOW_COUNT; i++) snowflakes.push(createSnowflake(true));
}

function createSnowflake(settled) {
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * (RADIUS - 10);
  return {
    x: CX + Math.cos(angle) * dist,
    y: settled ? CY + RADIUS * 0.5 + Math.random() * RADIUS * 0.4 : CY + Math.sin(angle) * dist,
    vx: 0, vy: 0,
    size: 1.5 + Math.random() * 3.5,
    depth: 0.3 + Math.random() * 0.7,
    opacity: 0.4 + Math.random() * 0.6,
    shimmer: Math.random() * Math.PI * 2,
    shimmerSpeed: 0.02 + Math.random() * 0.03,
    type: Math.random() < 0.15 ? 'crystal' : 'round'
  };
}

// ===== 星 =====
// すべての星は「ふんわり落ちる」で統一。starMode 時は夜空エリア通過中に
// 確率で停止して夜空に留まる。moving_to_fix の「シュッ」は廃止。
function spawnStar(atX, atY) {
  stars.push({
    x: atX !== undefined ? atX : MOON_X,
    y: atY !== undefined ? atY : MOON_Y,
    // ふんわり初速（さくらと同じ調子）
    vx: (Math.random() - 0.5) * 1.4,
    vy: -0.2 + Math.random() * 0.6,
    size: 2.5 + Math.random() * 3,
    depth: 0.4 + Math.random() * 0.6,
    opacity: 0.6 + Math.random() * 0.4,
    shimmer: Math.random() * Math.PI * 2,
    shimmerSpeed: 0.03 + Math.random() * 0.03,
    state: 'falling',
    // 地面の着地位置（さくらと同じ深さバラつき）
    landingY: GROUND_Y + 2 + Math.random() * 55
  });
}

function startStarSpawn() {
  if (starSpawnTimer) return;
  function spawn() {
    if (!starMode) return;
    spawnStar();
    starSpawnTimer = setTimeout(spawn, 800 + Math.random() * 1500);
  }
  spawn();
}

function stopStarSpawn() {
  if (starSpawnTimer) { clearTimeout(starSpawnTimer); starSpawnTimer = null; }
}

// ===== 花 =====
const FLOWER_COLORS = ['#ff6b9d','#ff9f43','#ffcc44','#88eeff','#cc88ff','#ff88aa','#66ddaa'];

function spawnFlower(x, y) {
  // 着地位置のyをそのまま使う（草原の奥行き全体に花畑ができる）
  flowers.push({
    x, y,
    size: 0, maxSize: 6 + Math.random() * 6,
    phase: 0,
    bloomTime: 0, bloomDuration: 3000 + Math.random() * 3000,
    color: FLOWER_COLORS[Math.floor(Math.random() * FLOWER_COLORS.length)],
    petals: 5 + Math.floor(Math.random() * 3),
    life: 1
  });
}

// ===== センサー =====
async function requestSensor() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    try { const p = await DeviceOrientationEvent.requestPermission(); if (p === 'granted') enableOrientation(); } catch(e) {}
    try { const p = await DeviceMotionEvent.requestPermission(); if (p === 'granted') enableMotion(); } catch(e) {}
    document.getElementById('permission-btn').style.display = 'none';
  }
}
function enableOrientation() {
  sensorReady = true;
  window.addEventListener('deviceorientation', (e) => {
    tiltX = Math.max(-1, Math.min(1, (e.gamma || 0) / 60));
    tiltY = Math.max(-1, Math.min(1, ((e.beta || 90) - 90) / 60));
  });
}
let lastShakeSpawn = 0;
let lastSwipeSpawn = 0;

function enableMotion() {
  window.addEventListener('devicemotion', (e) => {
    const a = e.accelerationIncludingGravity; if (!a) return;
    const dx = a.x - lastAccel.x, dy = a.y - lastAccel.y, dz = a.z - lastAccel.z;
    const force = Math.sqrt(dx*dx + dy*dy + dz*dz);
    motionBaseline = motionBaseline * 0.98 + force * 0.02;
    const net = force - motionBaseline;
    if (net > 2) shakeForce = Math.min(shakeForce + net * 0.6, 22);
    // 強めの振動で星を降らせる（100ms毎に 1〜2個。+30% ブースト）
    if (net > 5) {
      const now = Date.now();
      if (now - lastShakeSpawn > 100) {
        const n = 1 + (Math.random() < 0.3 ? 1 : 0);
        for (let i = 0; i < n; i++) spawnStar();
        lastShakeSpawn = now;
      }
    }
    lastAccel = { x: a.x||0, y: a.y||0, z: a.z||0 };
  });
}
function enableTouchFallback() {
  let touching = false;
  function maybeSpawnAt(clientX, clientY, rect) {
    const now = Date.now();
    if (now - lastSwipeSpawn < 80) return;
    const x = (clientX - rect.left) / rect.width * SIZE;
    const y = (clientY - rect.top) / rect.height * SIZE;
    spawnStar(x, y);
    lastSwipeSpawn = now;
  }
  canvas.addEventListener('mousedown', (e) => {
    touching = true;
    maybeSpawnAt(e.clientX, e.clientY, canvas.getBoundingClientRect());
  });
  canvas.addEventListener('mouseup', () => { touching = false; tiltX = 0; tiltY = 0; });
  canvas.addEventListener('mousemove', (e) => {
    if (!touching) return;
    const r = canvas.getBoundingClientRect();
    tiltX = ((e.clientX - r.left) / r.width * 2 - 1) * 0.8;
    tiltY = ((e.clientY - r.top) / r.height * 2 - 1) * 0.8;
    maybeSpawnAt(e.clientX, e.clientY, r);
  });
  let lastTap = 0;
  canvas.addEventListener('click', () => { const n = Date.now(); if (n - lastTap < 400) shakeForce = 20; lastTap = n; });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); touching = true; ut(e); }, {passive:false});
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (touching) ut(e); }, {passive:false});
  canvas.addEventListener('touchend', () => { touching = false; tiltX = 0; tiltY = 0; });
  function ut(e) {
    const t = e.touches[0], r = canvas.getBoundingClientRect();
    tiltX = ((t.clientX - r.left) / r.width * 2 - 1) * 0.8;
    tiltY = ((t.clientY - r.top) / r.height * 2 - 1) * 0.8;
    maybeSpawnAt(t.clientX, t.clientY, r);
  }
}
function initSensor() {
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('permission-btn').style.display = 'block';
    document.getElementById('permission-btn').addEventListener('click', requestSensor);
  } else if ('DeviceOrientationEvent' in window) {
    enableOrientation(); if ('DeviceMotionEvent' in window) enableMotion();
    setTimeout(() => { if (!sensorReady) enableTouchFallback(); }, 1500);
  }
  enableTouchFallback();
}

// ===== 描画 =====
function drawBackground() {
  ctx.save();
  ctx.beginPath(); ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2); ctx.clip();

  // 夜空
  const ng = ctx.createRadialGradient(CX, CY - 30, 20, CX, CY, RADIUS);
  ng.addColorStop(0, '#1a2a50'); ng.addColorStop(0.5, '#0f1a38'); ng.addColorStop(1, '#080e20');
  ctx.fillStyle = ng;
  ctx.fillRect(0, 0, SIZE, SIZE);

  // 背景の星
  ctx.fillStyle = 'rgba(255,255,200,0.6)';
  const bgStars = [[80,60],[140,40],[280,55],[100,100],[250,80],[180,30],[60,120],[320,130]];
  for (const [sx, sy] of bgStars) {
    ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.003 + sx) * 0.3;
    ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 月
  ctx.fillStyle = '#ffe8aa';
  ctx.beginPath(); ctx.arc(MOON_X, MOON_Y, 20, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0f1a38';
  ctx.beginPath(); ctx.arc(MOON_X + 10, MOON_Y - 5, 18, 0, Math.PI * 2); ctx.fill();

  // 地面（雪＋緑のミックス）
  // まず緑の草原ベース
  const grassGrad = ctx.createLinearGradient(0, GROUND_Y - 10, 0, CY + RADIUS);
  grassGrad.addColorStop(0, '#3a6a30');
  grassGrad.addColorStop(0.5, '#2a5a22');
  grassGrad.addColorStop(1, '#1a4a18');
  ctx.fillStyle = grassGrad;
  ctx.beginPath();
  ctx.moveTo(CX - RADIUS, GROUND_Y);
  ctx.quadraticCurveTo(CX - RADIUS * 0.5, GROUND_Y - 8, CX, GROUND_Y - 3);
  ctx.quadraticCurveTo(CX + RADIUS * 0.5, GROUND_Y + 5, CX + RADIUS, GROUND_Y);
  ctx.lineTo(CX + RADIUS, CY + RADIUS);
  ctx.arc(CX, CY, RADIUS, 0, Math.PI, false);
  ctx.closePath();
  ctx.fill();

  // 雪のパッチ（ところどころ残雪）
  ctx.fillStyle = 'rgba(230,238,248,0.6)';
  ctx.beginPath();
  ctx.ellipse(CX - 50, GROUND_Y + 10, 40, 10, -0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(CX + 60, GROUND_Y + 15, 35, 8, 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(CX + 10, GROUND_Y + 20, 30, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // 草のディテール
  ctx.strokeStyle = 'rgba(80,140,60,0.3)';
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 15; i++) {
    const gx = CX - RADIUS * 0.7 + (RADIUS * 1.4 / 15) * i + Math.sin(i * 5) * 5;
    const gy = GROUND_Y + 2 + Math.sin(gx * 0.03) * 3;
    const sw = Math.sin(Date.now() * 0.002 + i) * 2;
    ctx.beginPath(); ctx.moveTo(gx, gy);
    ctx.quadraticCurveTo(gx + sw, gy - 6, gx + sw * 1.2, gy - 10);
    ctx.stroke();
  }

  // ツリー
  drawTree(CX, CY + RADIUS * 0.35);
  // 雪だるま
  drawSnowman(CX + 70, CY + RADIUS * 0.45);
  // 家
  drawHouse(CX - 80, CY + RADIUS * 0.48);

  ctx.restore(); // クリップ解除
}

function drawTree(x, y) {
  ctx.fillStyle = '#5a3a1a'; ctx.fillRect(x - 5, y, 10, 20);
  ctx.fillStyle = '#1a6a30';
  ctx.beginPath(); ctx.moveTo(x, y - 55); ctx.lineTo(x - 22, y - 15); ctx.lineTo(x + 22, y - 15); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1a7a38';
  ctx.beginPath(); ctx.moveTo(x, y - 42); ctx.lineTo(x - 28, y - 2); ctx.lineTo(x + 28, y - 2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#1a8a40';
  ctx.beginPath(); ctx.moveTo(x, y - 28); ctx.lineTo(x - 34, y + 8); ctx.lineTo(x + 34, y + 8); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffe040'; ctx.font = '14px serif'; ctx.textAlign = 'center';
  ctx.fillText('⭐', x, y - 54);
  const orn = [{x:x-12,y:y-8,c:'#ff4444'},{x:x+14,y:y-12,c:'#4488ff'},{x:x-8,y:y-25,c:'#ffaa00'},{x:x+10,y:y-30,c:'#ff44aa'},{x:x-16,y:y+2,c:'#44ddff'},{x:x+6,y:y-2,c:'#ff6644'}];
  for (const o of orn) { ctx.fillStyle = o.c; ctx.beginPath(); ctx.arc(o.x, o.y, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(o.x-1, o.y-1, 1.5, 0, Math.PI*2); ctx.fill(); }
}

function drawSnowman(x, y) {
  ctx.fillStyle = '#f0f0f8'; ctx.beginPath(); ctx.arc(x, y+8, 18, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(180,190,210,0.3)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#f4f4fc'; ctx.beginPath(); ctx.arc(x, y-14, 13, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x-4, y-17, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+4, y-17, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff8844'; ctx.beginPath(); ctx.moveTo(x, y-13); ctx.lineTo(x+7, y-12); ctx.lineTo(x, y-10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#dd3344'; ctx.fillRect(x-14, y-4, 28, 5); ctx.fillRect(x+8, y-4, 6, 14);
  ctx.fillStyle = '#222'; ctx.fillRect(x-10, y-27, 20, 3); ctx.fillRect(x-7, y-38, 14, 12);
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.arc(x, y+4, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x, y+12, 2, 0, Math.PI*2); ctx.fill();
}

function drawHouse(x, y) {
  ctx.fillStyle = '#c8a070'; ctx.fillRect(x-20, y-10, 40, 30);
  ctx.fillStyle = '#884030';
  ctx.beginPath(); ctx.moveTo(x-26, y-10); ctx.lineTo(x, y-32); ctx.lineTo(x+26, y-10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e8eef8';
  ctx.beginPath(); ctx.moveTo(x-28, y-10); ctx.quadraticCurveTo(x-14, y-16, x, y-34);
  ctx.quadraticCurveTo(x+14, y-16, x+28, y-10); ctx.quadraticCurveTo(x+14, y-12, x, y-14);
  ctx.quadraticCurveTo(x-14, y-12, x-28, y-10); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ffdd66'; ctx.fillRect(x-12, y-4, 10, 8); ctx.fillRect(x+2, y-4, 10, 8);
  ctx.strokeStyle = '#a08060'; ctx.lineWidth = 1;
  ctx.strokeRect(x-12, y-4, 10, 8); ctx.strokeRect(x+2, y-4, 10, 8);
  ctx.fillStyle = '#8a6040'; ctx.fillRect(x-5, y+6, 10, 14);
}

function drawStarParticle(s) {
  const twinkle = 0.5 + Math.sin(s.shimmer * 2) * 0.5;
  const alpha = (s.opacity * 0.65 + twinkle * 0.35) * s.depth;
  const sz = Math.max(s.size * s.depth * 1.25, 1);
  ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.shimmer * 0.25);
  ctx.globalAlpha = alpha * 0.45;
  const g = ctx.createRadialGradient(0, 0, 0, 0, 0, sz * 2.8);
  g.addColorStop(0, 'rgba(255,255,230,1)'); g.addColorStop(0.35, 'rgba(255,240,180,0.55)'); g.addColorStop(1, 'rgba(255,240,180,0)');
  ctx.fillStyle = g; ctx.fillRect(-sz*2.8, -sz*2.8, sz*5.6, sz*5.6);
  ctx.globalAlpha = alpha; ctx.fillStyle = '#fffde8';
  const rl = sz * 2.0, rt = Math.max(sz * 0.15, 0.5);
  ctx.fillRect(-rt, -rl, rt*2, rl*2); ctx.fillRect(-rl, -rt, rl*2, rt*2);
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, 0, sz * 0.45, 0, Math.PI*2); ctx.fill();
  ctx.restore(); ctx.globalAlpha = 1;
}

function drawSnowflake(s) {
  const shimmer = Math.sin(s.shimmer) * 0.2;
  ctx.globalAlpha = (s.opacity + shimmer) * s.depth;
  if (s.type === 'crystal') {
    ctx.fillStyle = '#fff'; ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.shimmer * 2);
    for (let i = 0; i < 6; i++) { ctx.rotate(Math.PI / 3); ctx.fillRect(-0.5, 0, 1, s.size * 2); }
    ctx.restore();
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 0.4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,220,255,0.8)'; ctx.fill();
  } else {
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(s.x, s.y, s.size * s.depth, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawFlowers() {
  const now = Date.now();
  for (const f of flowers) {
    if (f.life <= 0) continue;
    if (f.phase === 0) {
      f.size += (f.maxSize - f.size) * 0.08;
      if (f.size > f.maxSize * 0.95) { f.phase = 1; f.bloomTime = now; }
    } else if (f.phase === 1) {
      if (now - f.bloomTime > f.bloomDuration) f.phase = 2;
    } else {
      f.life -= 0.015;
    }
    ctx.save(); ctx.translate(f.x, f.y); ctx.globalAlpha = f.life;
    for (let i = 0; i < f.petals; i++) {
      ctx.save(); ctx.rotate((Math.PI * 2 / f.petals) * i);
      ctx.fillStyle = f.color;
      ctx.beginPath(); ctx.ellipse(0, -f.size * 0.5, f.size * 0.3, f.size * 0.5, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.fillStyle = '#ffee88'; ctx.beginPath(); ctx.arc(0, 0, f.size * 0.25, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  // 消す
  for (let i = flowers.length - 1; i >= 0; i--) { if (flowers[i].life <= 0) flowers.splice(i, 1); }
}

function drawDomeGlass() {
  ctx.save(); ctx.beginPath(); ctx.arc(CX, CY, RADIUS, 0, Math.PI*2); ctx.clip();
  const hl = ctx.createRadialGradient(CX-40, CY-60, 10, CX-40, CY-60, 120);
  hl.addColorStop(0, 'rgba(255,255,255,0.12)'); hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl; ctx.fillRect(0, 0, SIZE, SIZE);
  ctx.strokeStyle = 'rgba(200,220,255,0.15)'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(CX, CY, RADIUS-2, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ===== 物理 =====
function respawnFromTop(s) {
  const a = -Math.PI/2 + (Math.random()-0.5) * Math.PI * 0.9;
  const r = RADIUS * (0.2 + Math.random() * 0.55);
  s.x = CX + Math.cos(a) * r; s.y = CY + Math.sin(a) * r;
  s.vx = (Math.random()-0.5) * 0.3; s.vy = 0.1 + Math.random() * 0.3;
}

function update() {
  const gravity = 0.05, tiltForce = 0.12;
  shakeForce *= 0.97; if (shakeForce < 0.05) shakeForce = 0;
  const turbulence = Math.min(shakeForce * 0.06, 0.6);
  const affectProb = Math.min(shakeForce * 0.08, 0.75);

  // 雪の更新
  for (const s of snowflakes) {
    s.vy += gravity * s.depth;
    s.vx += tiltX * tiltForce * s.depth;
    s.vy += tiltY * tiltForce * 0.5 * s.depth;
    if (turbulence > 0.01 && Math.random() < affectProb) {
      s.vx += (Math.random()-0.5) * turbulence * s.depth * 1.4;
      s.vy += (Math.random()-0.72) * turbulence * s.depth * 1.4;
    }
    if (autoSnow) s.vx += (Math.random()-0.5) * 0.1;
    s.vx *= 0.98; s.vy *= 0.98;
    s.vx += Math.sin(Date.now() * 0.001 + s.shimmer) * 0.02;
    s.x += s.vx; s.y += s.vy; s.shimmer += s.shimmerSpeed;
    // ドーム内
    const dx = s.x - CX, dy = s.y - CY, dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > RADIUS - s.size - 2) {
      const ang = Math.atan2(dy, dx);
      s.x = CX + Math.cos(ang) * (RADIUS - s.size - 3);
      s.y = CY + Math.sin(ang) * (RADIUS - s.size - 3);
      const dot = s.vx * Math.cos(ang) + s.vy * Math.sin(ang);
      s.vx -= 1.8 * dot * Math.cos(ang); s.vy -= 1.8 * dot * Math.sin(ang);
      s.vx *= 0.55; s.vy *= 0.55;
      const spd = s.vx*s.vx + s.vy*s.vy;
      if (spd < 0.08 && s.y < CY + RADIUS * 0.25) respawnFromTop(s);
    }
  }

  // 星の更新（すべて「ふんわり」で統一。夜空エリアを通過中に確率で停止）
  for (const st of stars) {
    st.shimmer += st.shimmerSpeed;

    if (st.state === 'fixed') {
      // 夜空にとどまって微かにゆらゆら
      st.x += Math.sin(Date.now() * 0.0008 + st.shimmer) * 0.15;
      st.y += Math.cos(Date.now() * 0.001 + st.shimmer * 1.3) * 0.1;
    } else if (st.state === 'falling') {
      // ふんわり重力
      st.vy += 0.022 * st.depth;
      st.vx += tiltX * 0.05 * st.depth;
      st.vy += tiltY * 0.025 * st.depth;
      st.vx *= 0.99; st.vy *= 0.99;
      st.vx += Math.sin(Date.now() * 0.001 + st.shimmer) * 0.015;
      st.x += st.vx; st.y += st.vy;

      // 夜空エリアを通過中に確率で停止（starMode時・上限内のみ）
      if (starMode
          && fixedStarCount < MAX_FIXED_STARS
          && st.y > SKY_TOP && st.y < SKY_BOTTOM
          && Math.random() < FIX_PROB) {
        st.state = 'fixed';
        st.vx = 0; st.vy = 0;
        fixedStarCount++;
      }

      // 地面に着地（さくら同様、粒子ごとにバラついた深さ）
      if (st.y > st.landingY) {
        st.state = 'landed';
        spawnFlower(st.x, st.landingY);
      }

      // ドームの壁（跳ね返り）
      const dx = st.x - CX, dy = st.y - CY, dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > RADIUS - st.size - 2) {
        const ang = Math.atan2(dy, dx);
        st.x = CX + Math.cos(ang) * (RADIUS - st.size - 3);
        st.y = CY + Math.sin(ang) * (RADIUS - st.size - 3);
        st.vx *= -0.3; st.vy *= -0.3;
      }
    }
  }
  // landed した星を除去
  for (let i = stars.length - 1; i >= 0; i--) {
    if (stars[i].state === 'landed') stars.splice(i, 1);
  }
}

// 流れ星
let shootingStars = [];
let lastShootingStar = 0;
function maybeSpawnShootingStar() {
  const now = Date.now();
  if (now - lastShootingStar > 8000 + Math.random() * 7000) {
    lastShootingStar = now;
    if (Math.random() < 0.6) {
      shootingStars.push({ x: 40+Math.random()*SIZE*0.5, y: 30+Math.random()*60,
        vx: 3+Math.random()*3, vy: 1+Math.random()*1.5, life: 1, trail: [] });
    }
  }
}
function updateShootingStars() {
  for (const ss of shootingStars) {
    ss.trail.unshift({x:ss.x, y:ss.y, alpha:ss.life}); if (ss.trail.length > 12) ss.trail.pop();
    ss.x += ss.vx; ss.y += ss.vy; ss.life -= 0.025;
  }
  shootingStars = shootingStars.filter(ss => ss.life > 0);
}
function drawShootingStars() {
  for (const ss of shootingStars) {
    for (let i = 0; i < ss.trail.length; i++) {
      const t = ss.trail[i], a = t.alpha * (1 - i/ss.trail.length) * 0.6, w = (1 - i/ss.trail.length) * 2.5;
      ctx.strokeStyle = `rgba(255,255,220,${a})`; ctx.lineWidth = w; ctx.lineCap = 'round';
      if (i < ss.trail.length - 1) { ctx.beginPath(); ctx.moveTo(ss.trail[i].x, ss.trail[i].y);
        ctx.lineTo(ss.trail[i+1].x, ss.trail[i+1].y); ctx.stroke(); }
    }
    ctx.globalAlpha = ss.life;
    ctx.fillStyle = '#fffde0'; ctx.beginPath(); ctx.arc(ss.x, ss.y, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,200,0.4)'; ctx.beginPath(); ctx.arc(ss.x, ss.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function render() {
  updateMoonOrbit();
  update();
  maybeSpawnShootingStar();
  updateShootingStars();
  ctx.clearRect(0, 0, SIZE, SIZE);
  drawBackground();

  // 花（地面の上に描画）
  ctx.save(); ctx.beginPath(); ctx.arc(CX, CY, RADIUS, 0, Math.PI*2); ctx.clip();
  drawFlowers();
  ctx.restore();

  drawShootingStars();

  // 雪（snowVisible時のみ）
  if (snowVisible) {
    const sortedSnow = [...snowflakes].sort((a, b) => a.depth - b.depth);
    for (const s of sortedSnow) drawSnowflake(s);
  }

  // 星（星モード時のみ）
  for (const st of stars) drawStarParticle(st);

  drawDomeGlass();
  requestAnimationFrame(render);
}

// ===== 開始 =====
initSnow();
initSensor();
render();

// 時計
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 1000);

// 自動雪
const autoBtn = document.getElementById('auto-btn');
autoBtn.addEventListener('click', () => {
  autoSnow = !autoSnow;
  autoBtn.classList.toggle('active', autoSnow);
  if (autoSnow) startAutoSnow(); else stopAutoSnow();
});
function startAutoSnow() {
  function shake() { if (!autoSnow) return;
    for (const s of snowflakes) { if (s.y > CY - RADIUS * 0.1) { s.vy = -(4+Math.random()*6); s.vx = (Math.random()-0.5)*4; } }
    autoTimer = setTimeout(shake, 5000+Math.random()*4000);
  } shake();
}
function stopAutoSnow() { if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; } }

// 星モード切替
const starBtn = document.getElementById('star-btn');
starBtn.addEventListener('click', () => {
  starMode = !starMode;
  starBtn.classList.toggle('star-active', starMode);
  if (starMode) {
    fixedStarCount = 0;
    startStarSpawn();
  } else {
    stopStarSpawn();
    // 固定されてる星を落とす
    for (const st of stars) {
      if (st.state === 'fixed') {
        st.state = 'falling';
        st.vy = 0.2 + Math.random() * 0.4; // ふんわり落下に合わせる
      }
    }
    fixedStarCount = 0;
  }
});

// 雪ON/OFF切替
const snowToggleBtn = document.getElementById('snow-toggle-btn');
snowToggleBtn.classList.add('active');
snowToggleBtn.addEventListener('click', () => {
  snowVisible = !snowVisible;
  snowToggleBtn.classList.toggle('active', snowVisible);
});

// ===== トースト =====
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== BGM =====
const BGM_TRACKS = [
  null,
  { name: '宇宙', src: './seishishitauchu.mp3' },
  { name: '夢',   src: './tenshinoyume.mp3' },
  { name: '星',   src: './yuubenohoshi.mp3' }
];
let bgmIndex = 0;
let bgmAudio = null;
const bgmBtn = document.getElementById('bgm-btn');
bgmBtn.addEventListener('click', () => {
  bgmIndex = (bgmIndex + 1) % BGM_TRACKS.length;
  if (bgmAudio) { bgmAudio.pause(); bgmAudio.src = ''; bgmAudio = null; }
  const track = BGM_TRACKS[bgmIndex];
  if (track) {
    bgmAudio = new Audio(track.src);
    bgmAudio.loop = true;
    bgmAudio.volume = 0.4;
    bgmAudio.play().catch(() => showToast('再生できなかった'));
    bgmBtn.textContent = `🎵 ${track.name}`;
    bgmBtn.classList.add('active');
  } else {
    bgmBtn.textContent = '🎵 おふ';
    bgmBtn.classList.remove('active');
  }
});

// ===== スリープ回避（Screen Wake Lock） =====
const AWAKE_MS = 15 * 60 * 1000;
let wakeLock = null;
let awakeUntil = 0;
let awakeTicker = null;
let lastDisplayedMin = -1;
const awakeBtn = document.getElementById('awake-btn');

async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return false;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
    return true;
  } catch (e) { return false; }
}

function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}

function renderAwakeBtn() {
  if (awakeUntil) {
    const remMin = Math.max(0, Math.ceil((awakeUntil - Date.now()) / 60000));
    if (remMin !== lastDisplayedMin) {
      awakeBtn.textContent = `🔆 あと${remMin}分`;
      lastDisplayedMin = remMin;
    }
  } else {
    awakeBtn.textContent = '🔆 しばらく見る';
    lastDisplayedMin = -1;
  }
}

async function startAwake() {
  if (!('wakeLock' in navigator)) { showToast('この端末では非対応だよ'); return; }
  const ok = await acquireWakeLock();
  if (!ok) { showToast('スリープ回避できなかった'); return; }
  awakeUntil = Date.now() + AWAKE_MS;
  awakeBtn.classList.add('active');
  renderAwakeBtn();
  showToast('15分 表示しつづけます');
  if (awakeTicker) clearInterval(awakeTicker);
  awakeTicker = setInterval(() => {
    if (Date.now() >= awakeUntil) { stopAwake('15分経過したよ'); return; }
    renderAwakeBtn();
  }, 1000);
}

function stopAwake(reason) {
  releaseWakeLock();
  awakeUntil = 0;
  if (awakeTicker) { clearInterval(awakeTicker); awakeTicker = null; }
  awakeBtn.classList.remove('active');
  renderAwakeBtn();
  if (reason) showToast(reason);
}

awakeBtn.addEventListener('click', () => {
  if (awakeUntil) stopAwake('スリープ回避を解除');
  else startAwake();
});

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && awakeUntil) {
    if (Date.now() >= awakeUntil) stopAwake();
    else if (!wakeLock) await acquireWakeLock();
  }
});

// 戻るボタン：履歴に index.html を積まず history.back() で戻る
// （メニューに居るときに Android ◀ を押すと PWA が終了するように）
document.querySelector('.back-btn').addEventListener('click', (e) => {
  if (history.length > 1) {
    e.preventDefault();
    history.back();
  }
});

// ===== Service Worker 登録（PWA） =====
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch((err) => {
      console.warn('SW registration failed:', err);
    });
  });
}
